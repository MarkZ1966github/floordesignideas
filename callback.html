<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authorized — Floor Design Ideas</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a1a;
           color: #fff; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; padding: 40px; }
    h1 { color: #c9a96e; font-size: 2rem; }
    p { color: #aaa; margin-top: 12px; }
    code { background: #2a2a2a; padding: 8px 16px;
           border-radius: 4px; color: #90EE90;
           font-size: 0.85rem; word-break: break-all; }
  </style>
  <script>
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) {
        document.getElementById('code').textContent = code;
        document.getElementById('code-section').style.display = 'block';
      }
    };
  </script>
</head>
<body>
  <div class="box">
    <h1>✓ Authorization Successful</h1>
    <p>TikTokMZM has been authorized for @floordesignideas</p>
    <div id="code-section" style="display:none; margin-top:20px;">
      <p>Authorization Code:</p>
      <code id="code"></code>
    </div>
  </div>
</body>
</html>
